<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Dashboard Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f4f6f9;padding:20px;}

.container{max-width:1100px;margin:auto;}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.nav-actions {
    display:flex;
    gap:10px;
}

#themeBtn, .logout-btn{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#333;
    color:white;
    cursor:pointer;
    width: auto;
}

.logout-btn {
    background:#e74c3c;
}

.cards{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:15px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
}

.card h3{font-size:12px;color:#666;}
.card p{font-size:18px;font-weight:bold;}

.receita{color:#2ecc71;}
.despesa{color:#e74c3c;}
.saldo{color:#3498db;}

.form-area{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:8px;
}

input,select{
    padding:8px;
    border:1px solid #ddd;
    border-radius:6px;
    width: 100%;
}

button{
    cursor:pointer;
    padding:8px;
    border:1px solid #ddd;
    border-radius:6px;
    background:#f4f6f9;
    width: 100%;
}

.delete-btn{
    background:#e74c3c;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    width: auto;
}

.budget-list {
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:10px;
}

.budget-badge {
    background:#e0e0e0;
    color:#333;
    padding:6px 12px;
    border-radius:20px;
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:13px;
}

.btn-x {
    background:none;
    border:none;
    color:#e74c3c;
    font-weight:bold;
    cursor:pointer;
    padding:0;
    width: auto;
}

/* CHARTS */
.charts{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-bottom:15px;
}

.chart-box{
    background:white;
    padding:10px;
    border-radius:10px;
}

/* TELA DE LOGIN */
.auth-screen {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 80vh;
}

.auth-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    width: 100%;
    max-width: 400px;
    text-align: center;
}

.auth-box h2 {
    margin-bottom: 20px;
    color: #333;
}

.auth-box input {
    margin-bottom: 12px;
}

.auth-buttons {
    display: flex;
    gap: 10px;
    margin-top: 8px;
}

.btn-primary {
    background: #3498db;
    color: white;
    border: none;
}

.auth-error {
    color: #e74c3c;
    margin-top: 12px;
    font-size: 14px;
}

/* DARK */
body.dark{
    background:#121212;
    color:white;
}

body.dark .card,
body.dark .form-area,
body.dark .chart-box,
body.dark .auth-box{
    background:#1e1e1e;
}
body.dark input,
body.dark select,
body.dark button{
    background:#2a2a2a;
    color:white;
    border-color:#444;
}
body.dark .budget-badge {
    background:#2a2a2a;
    color:white;
}
body.dark .auth-box h2 {
    color: white;
}

@media (max-width: 768px) {
    body {
        padding: 10px;
    }
    .top-bar {
        flex-direction: column;
        gap: 10px;
        text-align: center;
    }
    .cards {
        grid-template-columns: 1fr;
    }
    .form-grid {
        grid-template-columns: 1fr;
        gap: 12px;
    }
    .charts {
        grid-template-columns: 1fr;
    }
    table {
        font-size: 13px;
    }
    th, td {
        padding: 6px 4px;
    }
}
</style>
</head>

<body>

<div id="authScreen" class="auth-screen">
    <div class="auth-box">
        <h2>🔐 Aceder ao Painel</h2>
        <input type="email" id="authEmail" placeholder="E-mail">
        <input type="password" id="authPassword" placeholder="Palavra-passe">
        <div class="auth-buttons">
            <button onclick="login()">Entrar</button>
            <button onclick="register()" class="btn-primary">Criar Conta</button>
        </div>
        <div id="authError" class="auth-error"></div>
    </div>
</div>

<div class="container" id="appContainer" style="display: none;">

<div class="top-bar">
    <h2>💰 Finance Dashboard</h2>
    <div class="nav-actions">
        <button id="themeBtn" onclick="toggleTheme()">🌙</button>
        <button class="logout-btn" onclick="logout()">Sair 🚪</button>
    </div>
</div>

<div class="cards">
    <div class="card"><h3>Saldo Total</h3><p id="saldo">0</p></div>
    <div class="card"><h3>💳 Banco</h3><p id="banco">0</p></div>
    <div class="card"><h3>💵 Espécie</h3><p id="cash">0</p></div>
</div>

<div class="form-area">
    <h3>🗂️ Criar Nova Categoria</h3>
    <div class="form-grid">
        <select id="novaCatTipo">
            <option value="receita">Receita</option>
            <option value="despesa">Despesa</option>
        </select>
        <input id="novaCatNome" placeholder="Nome (ex: 💇‍♂️ Cabeleireiro)">
        <button onclick="addCategory()">Salvar Categoria</button>
    </div>
</div>

<div class="form-area">
    <h3>📊 Orçamento</h3>
    <div class="form-grid">
        <select id="orcCategoria"></select>
        <input id="orcValor" type="number" placeholder="Valor">
        <button onclick="addBudget()">Adicionar Orçamento</button>
    </div>
    <div id="listaOrcamentos" class="budget-list"></div>
</div>

<div class="form-area">
<div class="form-grid">

<input type="date" id="data">

<select id="tipo" onchange="setCategories()">
    <option value="receita">Receita</option>
    <option value="despesa">Despesa</option>
</select>

<select id="categoria"></select>

<select id="fonte">
    <option value="banco">💳 Banco</option>
    <option value="cash">💵 Espécie</option>
</select>

<input type="text" id="descricao" placeholder="Descrição">
<input type="number" id="valor" placeholder="Valor">

<button onclick="add()">Adicionar</button>

</div>
</div>

<div class="charts">
    <div class="chart-box"><canvas id="pie"></canvas></div>
    <div class="chart-box"><canvas id="bar"></canvas></div>
    <div class="chart-box"><canvas id="line"></canvas></div>
    <div class="chart-box"><canvas id="budgetChart"></canvas></div>
</div>

<div class="form-area" style="overflow-x: auto;">
<table width="100%">
<thead>
<tr>
<th>Data</th>
<th>Tipo</th>
<th>Categoria</th>
<th>Fonte</th>
<th>Descrição</th>
<th>Valor</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>
</div>

</div>

<script>

// ==========================================
// CONFIGURAÇÃO DO FIREBASE (Com as suas chaves!)
// ==========================================
const firebaseConfig = {
    apiKey: "AIzaSyB7fCT8Z9nBOIVsi5QH1pHz40fSQK54BJg",
    authDomain: "meu-financeiro-2fec1.firebaseapp.com",
    projectId: "meu-financeiro-2fec1",
    storageBucket: "meu-financeiro-2fec1.firebasestorage.app",
    messagingSenderId: "527401735210",
    appId: "1:527401735210:web:86198c25781f75a8a61f53"
};

// Inicializar Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Variáveis de controlo do utilizador e dados
let docRef = null;
let unsubscribeSnapshot = null;
let categorias = {
    receita: ["💼 Salário", "📈 Investimentos", "🎁 Extras"],
    despesa: ["🍔 Alimentação", "🛵 Manutenção da Moto", "🚗🛵 Seguro de Carro e Moto", "🎮 Lazer", "🎮 Jogos de PC", "🏠 Contas"]
};
let budgets = {};
let data = [];

/* CONTROLO DE AUTENTICAÇÃO (SISTEMA DE LOGIN) */
firebase.auth().onAuthStateChanged((user) => {
    if (user) {
        // Utilizador ligado -> Mostra o painel, esconde o login
        document.getElementById("authScreen").style.display = "none";
        document.getElementById("appContainer").style.display = "block";
        document.getElementById("authError").innerText = "";

        // Define o caminho da base de dados exclusivo deste ID de utilizador
        docRef = db.collection("usuarios").doc(user.uid);

        // Escuta os dados em tempo real para este utilizador específico
        unsubscribeSnapshot = docRef.onSnapshot((doc) => {
            if (doc.exists) {
                const cloudData = doc.data();
                data = cloudData.data || [];
                budgets = cloudData.budgets || {};
                categorias = cloudData.categorias || categorias;
            } else {
                // Se for uma conta nova, reinicia as variáveis para o padrão
                data = [];
                budgets = {};
                categorias = {
                    receita: ["💼 Salário", "📈 Investimentos", "🎁 Extras"],
                    despesa: ["🍔 Alimentação", "🛵 Manutenção da Moto", "🚗🛵 Seguro de Carro e Moto", "🎮 Lazer", "🎮 Jogos de PC", "🏠 Contas"]
                };
            }
            setCategories();
            render();
        });

    } else {
        // Utilizador desligado -> Mostra o login, esconde o painel
        document.getElementById("authScreen").style.display = "flex";
        document.getElementById("appContainer").style.display = "none";
        
        // Cancela a escuta da base de dados anterior
        if (unsubscribeSnapshot) unsubscribeSnapshot();
        docRef = null;
    }
});

/* FUNÇÕES DE LOGIN, REGISTO E LOGOUT */
function login() {
    const email = document.getElementById("authEmail").value;
    const pass = document.getElementById("authPassword").value;
    if(!email || !pass) return alert("Preencha todos os campos!");

    firebase.auth().signInWithEmailAndPassword(email, pass)
        .catch(error => document.getElementById("authError").innerText = error.message);
}

function register() {
    const email = document.getElementById("authEmail").value;
    const pass = document.getElementById("authPassword").value;
    if(!email || !pass) return alert("Preencha todos os campos!");

    firebase.auth().createUserWithEmailAndPassword(email, pass)
        .then(() => alert("Conta criada com sucesso!"))
        .catch(error => document.getElementById("authError").innerText = error.message);
}

function logout() {
    firebase.auth().signOut();
}

function normalize(str){
    return (str || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9 ]/g, "")
        .trim()
        .toLowerCase();
}

/* GUARDAR NA NUVEM */
function save(){
    if (!docRef) return;
    docRef.set({
        data: data,
        budgets: budgets,
        categorias: categorias
    }).catch(error => console.error("Erro ao guardar na nuvem: ", error));
}

function addCategory(){
    let tipo = document.getElementById("novaCatTipo").value;
    let nome = document.getElementById("novaCatNome").value.trim();

    if(!nome) return alert("Digite o nome da categoria!");

    if(!categorias[tipo].includes(nome)){
        categorias[tipo].push(nome);
        save();
        document.getElementById("novaCatNome").value = "";
    } else {
        alert("Esta categoria já existe!");
    }
}

function setCategories(){
    let t=document.getElementById("tipo").value;
    let c=document.getElementById("categoria");

    if(!c) return;
    c.innerHTML="";
    categorias[t].forEach(i=>{
        let o=document.createElement("option");
        o.value=i;
        o.innerText=i;
        c.appendChild(o);
    });

    let orcC = document.getElementById("orcCategoria");
    if(orcC){
        orcC.innerHTML = "";
        categorias.despesa.forEach(i=>{
            let o=document.createElement("option");
            o.value=i;
            o.innerText=i;
            orcC.appendChild(o);
        });
    }
}

function add(){
    let fonte=document.getElementById("fonte").value;
    let valInput = document.getElementById("valor").value;

    if(!valInput) return alert("Insira um valor!");

    data.push({
        id:Date.now(),
        data:document.getElementById("data").value,
        tipo:document.getElementById("tipo").value,
        categoria:document.getElementById("categoria").value,
        descricao:document.getElementById("descricao").value,
        valor:+valInput,
        fonte
    });

    save();
}

function del(id){
    data=data.filter(i=>i.id!==id);
    save();
}

function addBudget(){
    let cat=document.getElementById("orcCategoria").value;
    let val=+document.getElementById("orcValor").value;

    if(!cat) return alert("Selecione uma categoria!");

    budgets[cat]=val;
    save();
}

function delBudget(cat){
    delete budgets[cat];
    save();
}

let pie=new Chart(document.getElementById("pie"),{
    type:"pie",
    data:{labels:[],datasets:[{data:[],backgroundColor:[]}]}
});

let bar=new Chart(document.getElementById("bar"),{
    type:"bar",
    data:{labels:[],datasets:[{data:[],backgroundColor:[]}]}
});

let line=new Chart(document.getElementById("line"),{
    type:"line",
    data:{labels:[],datasets:[{data:[],borderColor:"#36a2eb",fill:true}]}
});

let budgetChart=new Chart(document.getElementById("budgetChart"),{
    type:"bar",
    data:{
        labels:[],
        datasets:[
            {label:"Gasto",data:[],backgroundColor:"#e74c3c"},
            {label:"Restante",data:[],backgroundColor:"#2ecc71"}
        ]
    }
});

function render(){
    let r=0;
    let banco=0;
    let cash=0;

    document.getElementById("body").innerHTML="";

    data.forEach(i=>{
        if(i.tipo=="receita"){
            r+=i.valor;
            if(i.fonte=="cash") cash+=i.valor;
            else banco+=i.valor;
        }else{
            if(i.fonte=="cash") cash-=i.valor;
            else banco-=i.valor;
        }

        document.getElementById("body").innerHTML+=`
        <tr>
            <td>${i.data}</td>
            <td>${i.tipo}</td>
            <td>${i.categoria}</td>
            <td>${i.fonte}</td>
            <td>${i.descricao}</td>
            <td>${i.valor}</td>
            <td><button class="delete-btn" onclick="del(${i.id})">X</button></td>
        </tr>`;
    });

    document.getElementById("saldo").innerText=(banco+cash);
    document.getElementById("banco").innerText=banco;
    document.getElementById("cash").innerText=cash;

    updateBudgetChart();
}

function updateBudgetChart(){
    let labels=[];
    let gastos=[];
    let restos=[];
    let hasBudget=false;

    let listaContainer = document.getElementById("listaOrcamentos");
    if(listaContainer) listaContainer.innerHTML = "";

    for(let cat in budgets){
        hasBudget=true;
        let gasto=0;

        data.forEach(t=>{
            if(t.tipo==="despesa"){
                if(normalize(t.categoria) === normalize(cat)){
                    gasto += t.valor;
                }
            }
        });

        labels.push(cat);
        gastos.push(gasto);

        let restante = budgets[cat] - gasto;
        restos.push(restante > 0 ? restante : 0);

        if(listaContainer){
            listaContainer.innerHTML += `
                <div class="budget-badge">
                    <span>${cat}: R$ ${budgets[cat]}</span>
                    <button class="btn-x" onclick="delBudget('${cat}')">❌</button>
                </div>
            `;
        }
    }

    if(!hasBudget){
        budgetChart.data.labels=["Sem orçamento"];
        budgetChart.data.datasets[0].data=[0];
        budgetChart.data.datasets[1].data=[0];
        budgetChart.update();
        return;
    }

    budgetChart.data.labels=labels;
    budgetChart.data.datasets[0].data=gastos;
    budgetChart.data.datasets[1].data=restos;
    budgetChart.update();
}

function toggleTheme(){
    document.body.classList.toggle("dark");
}
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('Service Worker registrado com sucesso!'));
  }
</script>
</body>
</html>
